name: Android CI

on:
  push:
    branches: [ "main", "master", "feat/**", "fix/**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-36
            build-tools;36.0.0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          # Pin to a known-good 3.27.x release that ships Dart 3.6 + AGP 8.7
          # support. Bump as the team validates newer toolchains.
          flutter-version: "3.27.4"
          cache: true

      - name: Show Flutter / Dart toolchain
        run: |
          flutter --version
          flutter doctor -v

      - name: Pub get
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Build release APK (HEVC default, APV opt-in)
        run: |
          flutter build apk \
            --release \
            --target-platform=android-arm,android-arm64,android-x64 \
            --split-per-abi

      - name: Upload split APKs
        uses: actions/upload-artifact@v4
        with:
          name: recorderzy-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - name: Upload mapping (release)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recorderzy-mapping
          path: build/app/outputs/mapping/release/
          if-no-files-found: ignore
          retention-days: 14
