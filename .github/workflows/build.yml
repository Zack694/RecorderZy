name: Build APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

# Avoid duplicate runs when both push and PR fire on the same SHA.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Resolve Flutter dependencies
        run: flutter pub get

      # Materialise android/local.properties manually because we don't ship
      # the gradle-wrapper.jar binary - subsequent `gradle wrapper` resolution
      # needs to know where the Flutter SDK lives before it has access to
      # any flutter tooling tasks.
      - name: Configure local.properties
        working-directory: android
        run: |
          set -e
          FLUTTER_BIN="$(command -v flutter)"
          FLUTTER_DIR="$(dirname "$(dirname "$FLUTTER_BIN")")"
          {
            echo "sdk.dir=${ANDROID_HOME}"
            echo "flutter.sdk=${FLUTTER_DIR}"
          } > local.properties
          cat local.properties

      # Flutter expects ./gradlew to live next to android/. We don't commit the
      # gradle-wrapper.jar binary, so we materialise it on the fly via the
      # already-installed Gradle.
      - name: Generate Gradle wrapper
        working-directory: android
        run: |
          gradle wrapper \
            --gradle-version 8.10.2 \
            --distribution-type bin
          chmod +x gradlew

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Pre-fetch Android platform 36
        run: |
          if [ -x "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
              "platforms;android-36" "build-tools;36.0.0" "platform-tools" \
              || true
          fi

      - name: Build debug APK
        run: flutter build apk --debug --target-platform=android-arm64

      - name: Build release APK (signed with debug key)
        run: flutter build apk --release --target-platform=android-arm64

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: RecorderZy-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: warn

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: RecorderZy-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
