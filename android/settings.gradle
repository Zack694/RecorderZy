pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localProps = file("local.properties")
        if (localProps.exists()) {
            localProps.withInputStream { properties.load(it) }
        }
        def path = properties.getProperty("flutter.sdk") ?:
                System.getenv("FLUTTER_ROOT") ?:
                System.getenv("FLUTTER_HOME")
        assert path != null,
            "flutter.sdk must be set in local.properties or FLUTTER_ROOT / FLUTTER_HOME env"
        return path
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.7.0" apply false
    id "org.jetbrains.kotlin.android" version "2.0.20" apply false
}

include ":app"
